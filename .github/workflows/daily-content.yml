name: Generar y Publicar Contenido Diario

on:
  schedule:
    # Corre todos los días a las 8:00 AM UTC (2:00 AM MX)
    - cron: '0 8 * * *'
  workflow_dispatch:  # Permitir ejecución manual

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm ci

      - name: Generar contenido con IA
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-content.js

      - name: Construir sitio estático
        run: node scripts/build-site.js

      - name: Commit y push de cambios
        run: |
          git config user.name "TechReview Bot"
          git config user.email "bot@techreviewpro.app"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Actualización automática $(date +'%Y-%m-%d')"
          git push
