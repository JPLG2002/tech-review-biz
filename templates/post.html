<article class="post">
  <div class="post-meta">
    <span class="category">{{CATEGORY}}</span>
    <time datetime="{{DATE}}">{{DATE_FORMATTED}}</time>
  </div>
  <h1>{{TITLE}}</h1>
  <div class="post-content">
    {{CONTENT}}
  </div>
  <div class="post-footer">
    <p class="disclaimer">Este artículo contiene enlaces de afiliado. Al comprar a través de ellos, apoyas este sitio sin costo adicional para ti.</p>
  </div>
</article>
